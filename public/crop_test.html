<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #0b1726; color: white; font-family: sans-serif; display: flex; gap: 20px; padding: 40px; }
    .crop-box { display: flex; flex-direction: column; align-items: center; }
    .circle-avatar {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #9484EC;
      margin-top: 10px;
    }
    .circle-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
  </style>
</head>
<body>
  <div class="crop-box">
    <h3>y=250</h3>
    <div class="circle-avatar"><img src="lana_crop_250.png"></div>
  </div>
  <div class="crop-box">
    <h3>y=300</h3>
    <div class="circle-avatar"><img src="lana_crop_300.png"></div>
  </div>
  <div class="crop-box">
    <h3>y=350</h3>
    <div class="circle-avatar"><img src="lana_crop_350.png"></div>
  </div>
  <div class="crop-box">
    <h3>y=400</h3>
    <div class="circle-avatar"><img src="lana_crop_400.png"></div>
  </div>
</body>
</html>
